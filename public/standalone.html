<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VambiOnAir Studio Console</title>
  <style>
    :root {
      --bg-primary: #0a0a12;
      --bg-secondary: rgba(20, 20, 35, 0.8);
      --bg-glass: rgba(30, 30, 50, 0.6);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.7);
      --text-muted: rgba(255, 255, 255, 0.5);
      --accent: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.3);
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --border: rgba(255, 255, 255, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(20px);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .clock {
      font-size: 24px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    .status-badge.connected {
      background: rgba(34, 197, 94, 0.2);
      color: var(--success);
    }

    .status-badge.disconnected {
      background: rgba(239, 68, 68, 0.2);
      color: var(--danger);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    .status-dot.connected { background: var(--success); }
    .status-dot.disconnected { background: var(--danger); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Main Layout */
    .main {
      display: flex;
      height: calc(100vh - 60px);
      overflow: hidden;
    }

    .left-panel {
      flex: 6;
      min-width: 650px;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 16px;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    .right-panel {
      flex: 4;
      min-width: 350px;
      padding: 16px;
      overflow: hidden;
    }

    /* Glass Card */
    .glass-card {
      background: var(--bg-glass);
      border: 1px solid var(--border);
      border-radius: 16px;
      backdrop-filter: blur(20px);
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
    }

    /* Now Playing */
    .now-playing {
      padding: 24px;
    }

    .now-playing-content {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .album-art {
      width: 120px;
      height: 120px;
      border-radius: 12px;
      background: linear-gradient(135deg, #1e1e2e, #2a2a3e);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }

    .album-art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .album-art-placeholder {
      font-size: 48px;
      opacity: 0.3;
    }

    .song-info {
      flex: 1;
      min-width: 0;
    }

    .song-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .song-artist {
      font-size: 16px;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }

    .progress-container {
      margin-bottom: 12px;
    }

    .progress-bar {
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #8b5cf6);
      border-radius: 3px;
      transition: width 0.1s linear;
    }

    .time-display {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    .countdown {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 24px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
    }

    .countdown-time {
      font-size: 48px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .countdown-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: #2563eb;
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .btn-danger {
      background: rgba(239, 68, 68, 0.2);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.3);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      padding: 8px;
    }

    .btn-ghost:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
    }

    .btn-icon {
      width: 36px;
      height: 36px;
      padding: 0;
      border-radius: 8px;
    }

    /* Queue */
    .queue {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .queue-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .queue-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 4px;
      transition: background 0.2s;
    }

    .queue-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .queue-item-color {
      width: 4px;
      height: 40px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .queue-item-info {
      flex: 1;
      min-width: 0;
    }

    .queue-item-title {
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .queue-item-artist {
      font-size: 13px;
      color: var(--text-muted);
    }

    .queue-item-time {
      font-size: 12px;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    /* Library */
    .library {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .library-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .library-path {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .library-path-text {
      font-size: 13px;
      color: var(--text-muted);
    }

    .search-input {
      width: 100%;
      padding: 10px 16px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
    }

    .search-input::placeholder {
      color: var(--text-muted);
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .library-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .library-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .library-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .library-item.selected {
      background: rgba(59, 130, 246, 0.2);
    }

    .library-item-icon {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 18px;
    }

    .library-item-icon.folder {
      background: rgba(251, 191, 36, 0.2);
    }

    .library-item-icon.file {
      background: rgba(59, 130, 246, 0.2);
    }

    .library-item-name {
      flex: 1;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .library-item-duration {
      font-size: 12px;
      color: var(--text-muted);
    }

    .library-actions {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn-success {
      background: var(--success);
      color: white;
    }

    .btn-success:hover {
      background: #16a34a;
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.3);
    }

    .btn-warning {
      background: rgba(245, 158, 11, 0.2);
      color: var(--warning);
      border: 1px solid rgba(245, 158, 11, 0.3);
    }

    .btn-warning:hover {
      background: rgba(245, 158, 11, 0.3);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      width: 90%;
      max-width: 450px;
      backdrop-filter: blur(20px);
      transform: scale(0.9);
      transition: transform 0.3s;
    }

    .modal-overlay.active .modal {
      transform: scale(1);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .modal-close {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 24px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
    }

    .modal-close:hover {
      color: var(--text-primary);
    }

    /* Voice Recorder */
    .recorder-status {
      text-align: center;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .recorder-timer {
      text-align: center;
      font-size: 48px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      margin-bottom: 16px;
    }

    .recorder-visualizer {
      height: 64px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .recorder-visualizer canvas {
      width: 100%;
      height: 100%;
    }

    .recorder-input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      margin-bottom: 16px;
    }

    .recorder-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .recorder-controls {
      display: flex;
      justify-content: center;
      gap: 16px;
    }

    .btn-record {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--danger);
      border: none;
      color: white;
      font-size: 24px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-record:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(239, 68, 68, 0.5);
    }

    .btn-record.recording {
      background: var(--bg-glass);
      border: 2px solid var(--border);
    }

    .btn-record.recording:hover {
      box-shadow: none;
    }

    /* File Upload */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 32px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 16px;
    }

    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--accent);
      background: rgba(59, 130, 246, 0.1);
    }

    .upload-zone-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .upload-zone-text {
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .upload-zone-hint {
      font-size: 12px;
      color: var(--text-muted);
    }

    .upload-file-input {
      display: none;
    }

    .upload-list {
      max-height: 200px;
      overflow-y: auto;
      margin-bottom: 16px;
    }

    .upload-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .upload-item-icon {
      font-size: 20px;
    }

    .upload-item-name {
      flex: 1;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .upload-item-size {
      font-size: 12px;
      color: var(--text-muted);
    }

    .upload-item-remove {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
    }

    .upload-item-remove:hover {
      color: var(--danger);
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--text-muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo">VambiOnAir Studio</div>
      <div class="clock" id="clock">--:--:--</div>
    </div>
    <div id="status" class="status-badge disconnected">
      <span class="status-dot disconnected"></span>
      <span>Odpojeno</span>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main">
    <!-- Left Panel -->
    <div class="left-panel">
      <!-- Now Playing -->
      <div class="glass-card">
        <div class="card-header">
          <span class="card-title">▶ Právě hraje</span>
          <button class="btn btn-danger" id="skipBtn" onclick="skipTrack()">
            ⏭ Přeskočit
          </button>
        </div>
        <div class="now-playing">
          <div class="now-playing-content">
            <div class="album-art" id="albumArt">
              <span class="album-art-placeholder">🎵</span>
            </div>
            <div class="song-info">
              <div class="song-title" id="songTitle">Načítám...</div>
              <div class="song-artist" id="songArtist">--</div>
              <div class="progress-container">
                <div class="progress-bar">
                  <div class="progress-fill" id="progressBar" style="width: 0%"></div>
                </div>
                <div class="time-display">
                  <span id="elapsedTime">0:00</span>
                  <span id="totalTime">0:00</span>
                </div>
              </div>
            </div>
            <div class="countdown">
              <div class="countdown-time" id="countdown">--:--</div>
              <div class="countdown-label">Zbývá</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Queue -->
      <div class="glass-card queue">
        <div class="card-header">
          <span class="card-title">📋 Fronta (<span id="queueCount">0</span>)</span>
          <button class="btn btn-ghost btn-icon" onclick="refreshQueue()">🔄</button>
        </div>
        <div class="queue-list" id="queueList">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="right-panel">
      <div class="glass-card library">
        <div class="library-header">
          <div class="library-path">
            <button class="btn btn-ghost btn-icon" onclick="navigateUp()" id="backBtn" style="display: none">←</button>
            <span class="library-path-text" id="currentPath">/ Knihovna</span>
            <button class="btn btn-ghost btn-icon" onclick="refreshLibrary()" style="margin-left: auto">🔄</button>
          </div>
          <input type="text" class="search-input" placeholder="Hledat..." id="searchInput" oninput="filterLibrary()">
        </div>
        <div class="library-list" id="libraryList">
          <div class="loading"><div class="spinner"></div></div>
        </div>
        <div class="library-actions">
          <button class="btn btn-primary" onclick="addSelectedToQueue()" id="addToQueueBtn" disabled>
            ➕ Přidat do fronty
          </button>
          <button class="btn btn-success" onclick="openVoiceRecorder()">
            🎤 Voice Track
          </button>
          <button class="btn btn-warning" onclick="openFileUpload()">
            📁 Nahrát soubory
          </button>
        </div>
      </div>
    </div>
  </main>

  <!-- Voice Recorder Modal -->
  <div class="modal-overlay" id="voiceRecorderModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">🎤 Nahrát Voice Track</div>
        <button class="modal-close" onclick="closeVoiceRecorder()">×</button>
      </div>
      <div class="recorder-status" id="recorderStatus">Připraveno k nahrávání</div>
      <div class="recorder-timer" id="recorderTimer">00:00</div>
      <div class="recorder-visualizer">
        <canvas id="recorderCanvas"></canvas>
      </div>
      <input type="text" class="recorder-input" id="recorderName" placeholder="Název nahrávky (volitelné)">
      <div class="recorder-controls">
        <button class="btn-record" id="recordBtn" onclick="toggleRecording()">●</button>
        <button class="btn btn-success" id="saveRecordingBtn" onclick="saveRecording()" disabled style="padding: 16px 24px;">
          💾 ULOŽIT DO FRONTY
        </button>
      </div>
    </div>
  </div>

  <!-- File Upload Modal -->
  <div class="modal-overlay" id="fileUploadModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">📁 Nahrát soubory</div>
        <button class="modal-close" onclick="closeFileUpload()">×</button>
      </div>
      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
        <div class="upload-zone-icon">📂</div>
        <div class="upload-zone-text">Klikněte nebo přetáhněte soubory</div>
        <div class="upload-zone-hint">Podporované formáty: MP3, WAV, OGG, FLAC</div>
      </div>
      <input type="file" class="upload-file-input" id="fileInput" multiple accept="audio/*">
      <div class="upload-list" id="uploadList"></div>
      <div style="display: flex; gap: 8px;">
        <button class="btn btn-primary" id="uploadBtn" onclick="uploadFiles()" disabled style="flex: 1;">
          ⬆ Nahrát a přidat do fronty
        </button>
      </div>
    </div>
  </div>
  </main>

  <script>
    // ========== CONFIGURATION ==========
    const CONFIG = {
      apiUrl: 'http://100.110.116.57/api',
      stationId: 1,
      apiKey: 'f39288465e74cc72:818cd40c5264e8e1079f76fa004ae382',
      streamUrl: 'http://100.110.116.57/listen/rádio_větrník_-_studio/radio.mp3',
      wsUrl: 'ws://100.110.116.57/api/live/nowplaying/websocket'
    };

    // Folder colors
    const FOLDER_COLORS = {
      'CORE ROCK': '#54c9ff',
      'Power Rock & Pop': '#54c9ff',
      'CzSk': '#54c9ff',
      '80s 90s DANCE HITS': '#54c9ff',
      'Vánoce': '#54c9ff',
      'Jingles': '#f70707',
      'Jingly': '#f70707',
      'Znělky': '#f70707',
      'START HODINY': '#7fcf30',
      'Promo': '#f58b0a',
      'REKLAMY': '#de0af5',
      'Reklama': '#de0af5',
      'Studio 303': '#0af5e1',
      'Zprávy': '#c6f50a'
    };

    // ========== STATE ==========
    let currentPath = '';
    let libraryItems = [];
    let selectedFiles = new Set();
    let nowPlayingData = null;
    let targetEndTime = 0;
    let duration = 0;

    // ========== HELPERS ==========
    function formatTime(seconds) {
      if (!seconds || seconds < 0) return '0:00';
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    function getColorForItem(text) {
      for (const [keyword, color] of Object.entries(FOLDER_COLORS)) {
        if (text.toLowerCase().includes(keyword.toLowerCase())) {
          return color;
        }
      }
      return '#3b82f6';
    }

    async function apiRequest(endpoint, options = {}) {
      const response = await fetch(`${CONFIG.apiUrl}${endpoint}`, {
        ...options,
        headers: {
          'X-API-Key': CONFIG.apiKey,
          'Content-Type': 'application/json',
          ...options.headers
        }
      });
      if (!response.ok) throw new Error(`API error: ${response.status}`);
      return response.json();
    }

    // ========== CLOCK ==========
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('cs-CZ');
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ========== TIMER ==========
    function updateTimer() {
      if (duration <= 0) return;

      const now = Date.now();
      let remainingMs = targetEndTime - now;
      if (remainingMs < 0) remainingMs = 0;

      const remainingSec = Math.ceil(remainingMs / 1000);
      const elapsedSec = duration - (remainingMs / 1000);
      const progress = ((duration * 1000 - remainingMs) / (duration * 1000)) * 100;

      document.getElementById('countdown').textContent = formatTime(remainingSec);
      document.getElementById('elapsedTime').textContent = formatTime(elapsedSec);
      document.getElementById('progressBar').style.width = `${Math.min(progress, 100)}%`;
    }
    setInterval(updateTimer, 50);

    // ========== NOW PLAYING ==========
    async function fetchNowPlaying() {
      try {
        const data = await apiRequest(`/nowplaying/${CONFIG.stationId}`);
        updateNowPlaying(data);
        updateStatus(true);
      } catch (e) {
        console.error('Failed to fetch now playing:', e);
        updateStatus(false);
      }
    }

    function updateNowPlaying(data) {
      nowPlayingData = data;
      const np = data.now_playing;
      
      if (np) {
        document.getElementById('songTitle').textContent = np.song.title || np.song.text || 'Neznámá skladba';
        document.getElementById('songArtist').textContent = np.song.artist || 'Neznámý interpret';
        document.getElementById('totalTime').textContent = formatTime(np.duration);
        
        // Album art
        const artEl = document.getElementById('albumArt');
        if (np.song.art) {
          artEl.innerHTML = `<img src="${np.song.art}" alt="Album art">`;
        } else {
          artEl.innerHTML = '<span class="album-art-placeholder">🎵</span>';
        }

        // Timer
        const remainingSeconds = np.duration - np.elapsed;
        targetEndTime = Date.now() + (remainingSeconds * 1000);
        duration = np.duration;
      }
    }

    function updateStatus(connected) {
      const el = document.getElementById('status');
      if (connected) {
        el.className = 'status-badge connected';
        el.innerHTML = '<span class="status-dot connected"></span><span>Připojeno</span>';
      } else {
        el.className = 'status-badge disconnected';
        el.innerHTML = '<span class="status-dot disconnected"></span><span>Odpojeno</span>';
      }
    }

    // ========== QUEUE ==========
    async function fetchQueue() {
      try {
        const data = await apiRequest(`/station/${CONFIG.stationId}/queue`);
        renderQueue(data);
      } catch (e) {
        console.error('Failed to fetch queue:', e);
      }
    }

    function renderQueue(items) {
      const container = document.getElementById('queueList');
      document.getElementById('queueCount').textContent = items.length;

      if (items.length === 0) {
        container.innerHTML = '<div class="empty-state">Fronta je prázdná</div>';
        return;
      }

      container.innerHTML = items.map(item => {
        const color = getColorForItem(item.song.text || item.song.title || '');
        return `
          <div class="queue-item">
            <div class="queue-item-color" style="background: ${color}"></div>
            <div class="queue-item-info">
              <div class="queue-item-title">${item.song.title || item.song.text || 'Neznámá'}</div>
              <div class="queue-item-artist">${item.song.artist || '--'}</div>
            </div>
            <div class="queue-item-time">${formatTime(item.duration)}</div>
            <button class="btn btn-ghost btn-icon" onclick="removeFromQueue(${item.id})">✕</button>
          </div>
        `;
      }).join('');
    }

    async function refreshQueue() {
      await fetchQueue();
    }

    async function removeFromQueue(id) {
      try {
        await apiRequest(`/station/${CONFIG.stationId}/queue/${id}`, { method: 'DELETE' });
        await fetchQueue();
      } catch (e) {
        console.error('Failed to remove from queue:', e);
        alert('Nepodařilo se odstranit z fronty');
      }
    }

    async function skipTrack() {
      try {
        await apiRequest(`/station/${CONFIG.stationId}/backend/skip`, { method: 'POST' });
        setTimeout(() => {
          fetchNowPlaying();
          fetchQueue();
        }, 500);
      } catch (e) {
        console.error('Failed to skip:', e);
        alert('Nepodařilo se přeskočit');
      }
    }

    // ========== LIBRARY ==========
    async function fetchLibrary(path = '') {
      try {
        const encodedPath = encodeURIComponent(path);
        const url = path 
          ? `/station/${CONFIG.stationId}/files/list?currentDirectory=${encodedPath}`
          : `/station/${CONFIG.stationId}/files/list`;
        
        libraryItems = await apiRequest(url);
        renderLibrary(libraryItems);
        currentPath = path;
        
        document.getElementById('currentPath').textContent = path ? `/ ${path}` : '/ Knihovna';
        document.getElementById('backBtn').style.display = path ? 'flex' : 'none';
      } catch (e) {
        console.error('Failed to fetch library:', e);
      }
    }

    function renderLibrary(items) {
      const container = document.getElementById('libraryList');

      if (items.length === 0) {
        container.innerHTML = '<div class="empty-state">Složka je prázdná</div>';
        return;
      }

      // Sort: folders first, then files
      const sorted = [...items].sort((a, b) => {
        if (a.is_dir && !b.is_dir) return -1;
        if (!a.is_dir && b.is_dir) return 1;
        return (a.name || a.path || '').localeCompare(b.name || b.path || '');
      });

      container.innerHTML = sorted.map(item => {
        const name = item.name || item.path.split('/').pop();
        const isSelected = selectedFiles.has(item.path);
        
        return `
          <div class="library-item ${isSelected ? 'selected' : ''}" 
               onclick="${item.is_dir ? `navigateTo('${item.path}')` : `toggleSelect('${item.path}')`}">
            <div class="library-item-icon ${item.is_dir ? 'folder' : 'file'}">
              ${item.is_dir ? '📁' : '🎵'}
            </div>
            <div class="library-item-name">${name}</div>
            ${!item.is_dir && item.length ? `<div class="library-item-duration">${formatTime(item.length)}</div>` : ''}
          </div>
        `;
      }).join('');
    }

    function filterLibrary() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const filtered = libraryItems.filter(item => {
        const name = (item.name || item.path || '').toLowerCase();
        return name.includes(query);
      });
      renderLibrary(filtered);
    }

    function navigateTo(path) {
      selectedFiles.clear();
      updateAddButton();
      fetchLibrary(path);
    }

    function navigateUp() {
      if (!currentPath) return;
      const parts = currentPath.split('/');
      parts.pop();
      navigateTo(parts.join('/'));
    }

    function refreshLibrary() {
      fetchLibrary(currentPath);
    }

    function toggleSelect(path) {
      if (selectedFiles.has(path)) {
        selectedFiles.delete(path);
      } else {
        selectedFiles.add(path);
      }
      renderLibrary(libraryItems.filter(item => {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const name = (item.name || item.path || '').toLowerCase();
        return name.includes(query);
      }));
      updateAddButton();
    }

    function updateAddButton() {
      const btn = document.getElementById('addToQueueBtn');
      btn.disabled = selectedFiles.size === 0;
      btn.textContent = selectedFiles.size > 0 
        ? `➕ Přidat do fronty (${selectedFiles.size})`
        : '➕ Přidat do fronty';
    }

    async function addSelectedToQueue() {
      if (selectedFiles.size === 0) return;
      
      try {
        await apiRequest(`/station/${CONFIG.stationId}/files/batch`, {
          method: 'PUT',
          body: JSON.stringify({ do: 'queue', files: Array.from(selectedFiles) })
        });
        selectedFiles.clear();
        updateAddButton();
        renderLibrary(libraryItems);
        await fetchQueue();
      } catch (e) {
        console.error('Failed to add to queue:', e);
        alert('Nepodařilo se přidat do fronty');
      }
    }

    // ========== WEBSOCKET ==========
    function connectWebSocket() {
      try {
        const ws = new WebSocket(CONFIG.wsUrl);
        
        ws.onopen = () => {
          console.log('WebSocket connected');
          ws.send(JSON.stringify({
            subs: { [`station:${CONFIG.stationId}`]: {} }
          }));
        };

        ws.onmessage = (event) => {
          try {
            const data = JSON.parse(event.data);
            if (data.pub?.data?.np) {
              updateNowPlaying(data.pub.data.np);
              updateStatus(true);
            }
          } catch (e) {
            console.error('WebSocket parse error:', e);
          }
        };

        ws.onclose = () => {
          console.log('WebSocket closed, reconnecting...');
          setTimeout(connectWebSocket, 3000);
        };

        ws.onerror = () => {
          console.log('WebSocket error');
        };
      } catch (e) {
        console.log('WebSocket not available, using polling only');
      }
    }

    // ========== VOICE RECORDER ==========
    let mediaRecorder = null;
    let audioChunks = [];
    let recordingStartTime = 0;
    let recordingInterval = null;
    let audioContext = null;
    let analyser = null;
    let animationFrame = null;
    let recordedBlob = null;

    function openVoiceRecorder() {
      document.getElementById('voiceRecorderModal').classList.add('active');
      resetRecorder();
    }

    function closeVoiceRecorder() {
      document.getElementById('voiceRecorderModal').classList.remove('active');
      stopRecording();
      resetRecorder();
    }

    function resetRecorder() {
      document.getElementById('recorderStatus').textContent = 'Připraveno k nahrávání';
      document.getElementById('recorderTimer').textContent = '00:00';
      document.getElementById('recorderName').value = '';
      document.getElementById('recordBtn').innerHTML = '●';
      document.getElementById('recordBtn').classList.remove('recording');
      document.getElementById('saveRecordingBtn').disabled = true;
      recordedBlob = null;
      audioChunks = [];
    }

    async function toggleRecording() {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        stopRecording();
      } else {
        await startRecording();
      }
    }

    async function startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
        audioChunks = [];

        // Setup visualizer
        audioContext = new AudioContext();
        analyser = audioContext.createAnalyser();
        const source = audioContext.createMediaStreamSource(stream);
        source.connect(analyser);
        analyser.fftSize = 256;
        drawVisualizer();

        mediaRecorder.ondataavailable = (e) => {
          if (e.data.size > 0) {
            audioChunks.push(e.data);
          }
        };

        mediaRecorder.onstop = () => {
          recordedBlob = new Blob(audioChunks, { type: 'audio/webm' });
          document.getElementById('saveRecordingBtn').disabled = false;
          document.getElementById('recorderStatus').textContent = 'Nahrávka připravena k uložení';
        };

        mediaRecorder.start(100);
        recordingStartTime = Date.now();
        
        document.getElementById('recordBtn').innerHTML = '■';
        document.getElementById('recordBtn').classList.add('recording');
        document.getElementById('recorderStatus').textContent = 'Nahrávám...';

        recordingInterval = setInterval(() => {
          const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
          const mins = Math.floor(elapsed / 60).toString().padStart(2, '0');
          const secs = (elapsed % 60).toString().padStart(2, '0');
          document.getElementById('recorderTimer').textContent = `${mins}:${secs}`;
        }, 1000);

      } catch (error) {
        console.error('Microphone access error:', error);
        alert('Nepodařilo se získat přístup k mikrofonu');
      }
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        mediaRecorder.stream.getTracks().forEach(track => track.stop());
      }

      if (recordingInterval) {
        clearInterval(recordingInterval);
        recordingInterval = null;
      }

      if (animationFrame) {
        cancelAnimationFrame(animationFrame);
        animationFrame = null;
      }

      if (audioContext) {
        audioContext.close();
        audioContext = null;
      }

      analyser = null;
      
      document.getElementById('recordBtn').innerHTML = '●';
      document.getElementById('recordBtn').classList.remove('recording');
    }

    function drawVisualizer() {
      const canvas = document.getElementById('recorderCanvas');
      const ctx = canvas.getContext('2d');
      if (!ctx || !analyser) return;

      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;

      const bufferLength = analyser.frequencyBinCount;
      const dataArray = new Uint8Array(bufferLength);

      function draw() {
        if (!analyser) return;
        animationFrame = requestAnimationFrame(draw);

        analyser.getByteFrequencyData(dataArray);

        ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const barWidth = (canvas.width / bufferLength) * 2.5;
        let x = 0;

        for (let i = 0; i < bufferLength; i++) {
          const barHeight = (dataArray[i] / 255) * canvas.height;
          const hue = (i / bufferLength) * 120 + 160;
          ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;
          ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
          x += barWidth + 1;
        }
      }

      draw();
    }

    async function saveRecording() {
      if (!recordedBlob) return;

      const name = document.getElementById('recorderName').value.trim() || 
        `VoiceTrack_${new Date().toISOString().slice(0, 19).replace(/[T:]/g, '-')}`;

      try {
        // Convert blob to base64 for upload
        const formData = new FormData();
        formData.append('file', recordedBlob, `${name}.webm`);

        const response = await fetch(`${CONFIG.apiUrl}/station/${CONFIG.stationId}/files`, {
          method: 'POST',
          headers: {
            'X-API-Key': CONFIG.apiKey
          },
          body: formData
        });

        if (!response.ok) throw new Error('Upload failed');

        const result = await response.json();
        
        // Add to queue
        if (result.path) {
          await apiRequest(`/station/${CONFIG.stationId}/files/batch`, {
            method: 'PUT',
            body: JSON.stringify({ do: 'queue', files: [result.path] })
          });
        }

        alert('Voice track nahrán a přidán do fronty!');
        closeVoiceRecorder();
        await fetchQueue();

      } catch (error) {
        console.error('Failed to save recording:', error);
        alert('Nepodařilo se uložit nahrávku');
      }
    }

    // ========== FILE UPLOAD ==========
    let filesToUpload = [];

    function openFileUpload() {
      document.getElementById('fileUploadModal').classList.add('active');
      resetFileUpload();
      setupDragDrop();
    }

    function closeFileUpload() {
      document.getElementById('fileUploadModal').classList.remove('active');
      resetFileUpload();
    }

    function resetFileUpload() {
      filesToUpload = [];
      document.getElementById('uploadList').innerHTML = '';
      document.getElementById('uploadBtn').disabled = true;
      document.getElementById('fileInput').value = '';
    }

    function setupDragDrop() {
      const zone = document.getElementById('uploadZone');
      
      zone.ondragover = (e) => {
        e.preventDefault();
        zone.classList.add('dragover');
      };

      zone.ondragleave = () => {
        zone.classList.remove('dragover');
      };

      zone.ondrop = (e) => {
        e.preventDefault();
        zone.classList.remove('dragover');
        handleFiles(e.dataTransfer.files);
      };

      document.getElementById('fileInput').onchange = (e) => {
        handleFiles(e.target.files);
      };
    }

    function handleFiles(files) {
      const audioFiles = Array.from(files).filter(f => f.type.startsWith('audio/'));
      
      for (const file of audioFiles) {
        if (!filesToUpload.find(f => f.name === file.name)) {
          filesToUpload.push(file);
        }
      }

      renderUploadList();
    }

    function formatFileSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function renderUploadList() {
      const container = document.getElementById('uploadList');
      
      container.innerHTML = filesToUpload.map((file, index) => `
        <div class="upload-item">
          <div class="upload-item-icon">🎵</div>
          <div class="upload-item-name">${file.name}</div>
          <div class="upload-item-size">${formatFileSize(file.size)}</div>
          <button class="upload-item-remove" onclick="removeUploadFile(${index})">✕</button>
        </div>
      `).join('');

      document.getElementById('uploadBtn').disabled = filesToUpload.length === 0;
      document.getElementById('uploadBtn').textContent = filesToUpload.length > 0
        ? `⬆ Nahrát a přidat do fronty (${filesToUpload.length})`
        : '⬆ Nahrát a přidat do fronty';
    }

    function removeUploadFile(index) {
      filesToUpload.splice(index, 1);
      renderUploadList();
    }

    async function uploadFiles() {
      if (filesToUpload.length === 0) return;

      const btn = document.getElementById('uploadBtn');
      btn.disabled = true;
      btn.textContent = '⏳ Nahrávám...';

      const uploadedPaths = [];

      try {
        for (const file of filesToUpload) {
          const formData = new FormData();
          formData.append('file', file);

          const response = await fetch(`${CONFIG.apiUrl}/station/${CONFIG.stationId}/files`, {
            method: 'POST',
            headers: {
              'X-API-Key': CONFIG.apiKey
            },
            body: formData
          });

          if (response.ok) {
            const result = await response.json();
            if (result.path) {
              uploadedPaths.push(result.path);
            }
          }
        }

        // Add all uploaded files to queue
        if (uploadedPaths.length > 0) {
          await apiRequest(`/station/${CONFIG.stationId}/files/batch`, {
            method: 'PUT',
            body: JSON.stringify({ do: 'queue', files: uploadedPaths })
          });
        }

        alert(`${uploadedPaths.length} souborů nahráno a přidáno do fronty!`);
        closeFileUpload();
        await Promise.all([fetchQueue(), fetchLibrary(currentPath)]);

      } catch (error) {
        console.error('Upload failed:', error);
        alert('Nepodařilo se nahrát soubory');
      }

      btn.disabled = false;
      renderUploadList();
    }

    // ========== INIT ==========
    async function init() {
      await Promise.all([
        fetchNowPlaying(),
        fetchQueue(),
        fetchLibrary('')
      ]);

      connectWebSocket();

      // Polling fallback
      setInterval(fetchNowPlaying, 5000);
      setInterval(fetchQueue, 8000);
    }

    init();
  </script>
</body>
</html>
